<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeMind — Free Coding AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --user-bubble: #1a1a2e;
    --ai-bubble: #0f1923;
    --glow: rgba(0, 229, 255, 0.12);
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .logo span { color: var(--accent); }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    background: rgba(16, 185, 129, 0.15);
    color: var(--accent3);
    border: 1px solid rgba(16, 185, 129, 0.3);
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-new {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-new:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--glow);
  }

  /* MAIN LAYOUT */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 6px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 8px 8px;
  }

  .session-item {
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.78rem;
    color: var(--muted);
    border: 1px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .session-item:hover {
    background: var(--surface2);
    color: var(--text);
  }
  .session-item.active {
    background: var(--user-bubble);
    color: var(--text);
    border-color: var(--border);
  }
  .session-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    opacity: 0.6;
  }
  .session-item.active .dot { opacity: 1; }

  /* CHAT AREA */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* WELCOME */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    padding: 40px 20px;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }
  .welcome-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,58,237,0.15));
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    box-shadow: 0 0 40px var(--glow);
  }
  .welcome h2 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .welcome h2 span { color: var(--accent); }
  .welcome p {
    font-size: 0.85rem;
    color: var(--muted);
    max-width: 360px;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
  }

  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 500px;
    width: 100%;
    margin-top: 8px;
  }
  .suggestion-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 11px 14px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .suggestion-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--glow);
  }
  .suggestion-btn strong {
    display: block;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 2px;
    font-size: 0.75rem;
  }

  /* MESSAGES */
  .msg-row {
    display: flex;
    padding: 8px 28px;
    gap: 14px;
    animation: fadeUp 0.25s ease both;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .avatar.ai {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Syne', sans-serif;
  }
  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .bubble {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.875rem;
    line-height: 1.7;
    position: relative;
  }
  .bubble.user-bubble {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }
  .bubble.ai-bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  /* CODE BLOCKS */
  .bubble pre {
    background: #060609;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
    position: relative;
  }
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.6;
    color: #a8e6cf;
  }
  .bubble p code {
    background: rgba(0,229,255,0.08);
    color: var(--accent);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.82em;
  }
  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble em { color: #c4b5fd; font-style: normal; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble p { margin: 6px 0; }
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }

  /* THINKING INDICATOR */
  .thinking {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }
  .thinking-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease infinite;
    opacity: 0.7;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* INPUT AREA */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }
  .input-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0.3;
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0,229,255,0.08);
  }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    min-height: 24px;
  }
  #userInput::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 9px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: #000;
    font-size: 1rem;
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 16px var(--glow); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.05em;
    opacity: 0.6;
  }

  /* ERROR */
  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    margin: 8px 28px;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  /* SCROLLBAR */
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .sidebar { display: none; }
    .msg-row { padding: 6px 14px; }
    .bubble { max-width: 90%; }
    .input-area { padding: 12px 14px 16px; }
    .suggestions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Code<span>Mind</span>
  </div>
  <div class="badge">∞ FREE · NO LIMITS</div>
  <div class="header-actions">
    <button class="btn-new" onclick="newChat()">+ New Chat</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">Recent Chats</div>
    <!-- sessions populated by JS -->
  </aside>

  <div class="chat-container">
    <div class="messages" id="messages">
      <!-- Welcome shown until first message -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Your Free <span>Coding AI</span></h2>
        <p>Ask anything about code. Unlimited chats, no sign-up required.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">
            <strong>Debug my code</strong>
            Paste your code and describe the issue
          </button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">
            <strong>Explain a concept</strong>
            Recursion, async/await, closures…
          </button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">
            <strong>Write a function</strong>
            Describe what you need built
          </button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">
            <strong>Code review</strong>
            Get feedback on your code
          </button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Ask anything about code…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">ENTER to send · SHIFT+ENTER for new line · powered by Claude</div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let sessions = JSON.parse(localStorage.getItem('cm_sessions') || '[]');
let currentId = null;
let isLoading = false;

// ─── Init ────────────────────────────────────────────────────────────────────
if (sessions.length > 0) {
  loadSession(sessions[0].id);
} else {
  newChat();
}
renderSidebar();

// ─── Session Management ──────────────────────────────────────────────────────
function newChat() {
  const id = Date.now().toString();
  const session = { id, title: 'New Chat', messages: [] };
  sessions.unshift(session);
  saveSessions();
  loadSession(id);
  renderSidebar();
}

function loadSession(id) {
  currentId = id;
  const session = sessions.find(s => s.id === id);
  if (!session) return;

  const container = document.getElementById('messages');
  container.innerHTML = '';

  if (session.messages.length === 0) {
    container.innerHTML = `<div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Your Free <span>Coding AI</span></h2>
      <p>Ask anything about code. Unlimited chats, no sign-up required.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)"><strong>Debug my code</strong>Paste your code and describe the issue</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)"><strong>Explain a concept</strong>Recursion, async/await, closures…</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)"><strong>Write a function</strong>Describe what you need built</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)"><strong>Code review</strong>Get feedback on your code</button>
      </div>
    </div>`;
  } else {
    session.messages.forEach(m => appendBubble(m.role, m.content, false));
  }

  renderSidebar();
  scrollToBottom();
}

function saveSessions() {
  localStorage.setItem('cm_sessions', JSON.stringify(sessions));
}

function currentSession() {
  return sessions.find(s => s.id === currentId);
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const label = el.querySelector('.sidebar-label');
  el.innerHTML = '';
  el.appendChild(label);
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentId ? ' active' : '');
    div.innerHTML = `<span class="dot"></span>${s.title}`;
    div.onclick = () => loadSession(s.id);
    el.appendChild(div);
  });
}

// ─── Sending Messages ────────────────────────────────────────────────────────
function sendSuggestion(btn) {
  const strong = btn.querySelector('strong');
  document.getElementById('userInput').value = strong.textContent;
  sendMessage();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);

  const session = currentSession();
  if (!session) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  session.messages.push({ role: 'user', content: text });
  if (session.title === 'New Chat') {
    session.title = text.slice(0, 32) + (text.length > 32 ? '…' : '');
  }
  saveSessions();
  renderSidebar();
  appendBubble('user', text);
  scrollToBottom();

  // Show thinking
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  const thinkingEl = appendThinking();
  scrollToBottom();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are CodeMind, an expert coding assistant. You help with all programming languages, debugging, algorithms, architecture, and code review. 
Format your responses clearly:
- Use \`code\` for inline code
- Use triple backtick fences with language names for code blocks (e.g. \`\`\`python)
- Use **bold** for important terms
- Be concise but thorough`,
        messages: session.messages.map(m => ({ role: m.role, content: m.content }))
      })
    });

    thinkingEl.remove();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const aiText = data.content?.map(b => b.text || '').join('') || 'No response.';

    session.messages.push({ role: 'assistant', content: aiText });
    saveSessions();
    appendBubble('assistant', aiText);
    scrollToBottom();
  } catch (err) {
    thinkingEl.remove();
    appendError(err.message);
    // Remove failed user message from history
    session.messages.pop();
    saveSessions();
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ─── DOM Helpers ─────────────────────────────────────────────────────────────
function appendBubble(role, content, animate = true) {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (!animate) row.style.animation = 'none';

  if (role === 'assistant') {
    row.innerHTML = `
      <div class="avatar ai">AI</div>
      <div class="bubble ai-bubble">${formatContent(content)}</div>
    `;
  } else {
    row.innerHTML = `
      <div class="bubble user-bubble">${escapeHtml(content)}</div>
      <div class="avatar user-av">U</div>
    `;
  }
  container.appendChild(row);

  // Add copy buttons to code blocks
  row.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'copy';
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.querySelector('code')?.textContent || pre.textContent);
      btn.textContent = 'copied!';
      setTimeout(() => btn.textContent = 'copy', 1500);
    };
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });

  return row;
}

function appendThinking() {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `
    <div class="avatar ai">AI</div>
    <div class="bubble ai-bubble">
      <div class="thinking">
        <div class="thinking-dots">
          <span></span><span></span><span></span>
        </div>
        thinking…
      </div>
    </div>
  `;
  container.appendChild(row);
  return row;
}

function appendError(msg) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = `⚠ Error: ${msg}`;
  container.appendChild(el);
}

function formatContent(text) {
  // Escape HTML first, then restore code blocks
  let result = text;
  const codeBlocks = [];

  // Extract fenced code blocks
  result = result.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang || '', code: code.trim() });
    return `__CODEBLOCK_${idx}__`;
  });

  // Escape HTML
  result = escapeHtml(result);

  // Restore code blocks
  result = result.replace(/__CODEBLOCK_(\d+)__/g, (_, idx) => {
    const { lang, code } = codeBlocks[idx];
    return `<pre><code class="language-${lang}">${escapeHtml(code)}</code></pre>`;
  });

  // Inline code
  result = result.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  result = result.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  result = result.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Lists
  result = result.replace(/^- (.+)$/gm, '<li>$1</li>');
  result = result.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Paragraphs (double newline)
  result = result.replace(/\n\n/g, '</p><p>');
  result = result.replace(/\n/g, '<br>');
  result = `<p>${result}</p>`;
  result = result.replace(/<p><\/p>/g, '');

  return result;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ─── Input Handling ──────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
</script>
</body>
